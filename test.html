<!DOCTYPE html>
<html>
<head>
    <title>SeismicX System Test</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #1a1a1a; color: white; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #333; border-radius: 5px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 3px; cursor: pointer; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <h1>SeismicX System - 功能测试页面</h1>
    
    <div class="test-section">
        <h2>WebSocket 连接测试</h2>
        <button onclick="testWebSocket()">测试 WebSocket 连接</button>
        <div id="ws-status">未连接</div>
    </div>

    <div class="test-section">
        <h2>API 接口测试</h2>
        <button onclick="testAPI('/api/health')">测试健康检查</button>
        <button onclick="testAPI('/api/earthquakes')">测试地震数据</button>
        <button onclick="testAPI('/api/stations')">测试台站数据</button>
        <button onclick="testAPI('/api/stats')">测试统计数据</button>
        <div id="api-results"></div>
    </div>

    <div class="test-section">
        <h2>数据库测试</h2>
        <button onclick="testDatabase()">测试数据库连接</button>
        <div id="db-status">未测试</div>
    </div>

    <script>
        let ws = null;

        function testWebSocket() {
            const statusDiv = document.getElementById('ws-status');
            
            if (ws) {
                ws.close();
                ws = null;
                statusDiv.innerHTML = '<span class="info">正在重新连接...</span>';
            }

            ws = new WebSocket('ws://localhost:3000');
            
            ws.onopen = function() {
                statusDiv.innerHTML = '<span class="success">✓ WebSocket 连接成功</span>';
                ws.send(JSON.stringify({type: 'ping'}));
            };
            
            ws.onmessage = function(event) {
                console.log('收到消息:', event.data);
                statusDiv.innerHTML += '<br><span class="info">收到数据: ' + event.data.substring(0, 100) + '...</span>';
            };
            
            ws.onerror = function(error) {
                statusDiv.innerHTML = '<span class="error">✗ WebSocket 连接错误: ' + error + '</span>';
            };
            
            ws.onclose = function() {
                statusDiv.innerHTML = '<span class="error">✗ WebSocket 连接已关闭</span>';
            };
        }

        async function testAPI(endpoint) {
            const resultsDiv = document.getElementById('api-results');
            resultsDiv.innerHTML = '<span class="info">正在测试 ' + endpoint + '...</span>';
            
            try {
                const response = await fetch(endpoint);
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML = '<span class="success">✓ ' + endpoint + ' 成功<br>数据: ' + JSON.stringify(data, null, 2).substring(0, 200) + '...</span>';
                } else {
                    resultsDiv.innerHTML = '<span class="error">✗ ' + endpoint + ' 失败: ' + response.status + '</span>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<span class="error">✗ ' + endpoint + ' 错误: ' + error.message + '</span>';
            }
        }

        async function testDatabase() {
            const dbStatusDiv = document.getElementById('db-status');
            dbStatusDiv.innerHTML = '<span class="info">正在测试数据库...</span>';
            
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.earthquakes && data.stations) {
                    dbStatusDiv.innerHTML = `
                        <span class="success">✓ 数据库连接正常</span><br>
                        <span class="info">地震记录数: ${data.earthquakes.total_count || 0}</span><br>
                        <span class="info">台站记录数: ${data.stations.total_count || 0}</span>
                    `;
                } else {
                    dbStatusDiv.innerHTML = '<span class="error">✗ 数据库数据格式异常</span>';
                }
            } catch (error) {
                dbStatusDiv.innerHTML = '<span class="error">✗ 数据库测试失败: ' + error.message + '</span>';
            }
        }

        // 页面加载时自动测试
        window.onload = function() {
            setTimeout(() => {
                testWebSocket();
                testAPI('/api/health');
            }, 1000);
        };
    </script>
</body>
</html>
